name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write  # Necessário para dar permissão de escrita no GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Login no GitHub Container Registry (GHCR)
    - name: Log into GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. Gera a tag dinâmica com base no timestamp e trata maiúsculas/minúsculas do owner
    - name: Set current date as env variable
      run: |
        echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV
    
    # 3. Build & Push no GHCR
    - name: Build and push Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/${{ env.OWNER_LOWER }}/rustavoid:${{ env.IMAGE_TAG }}
        docker push ghcr.io/${{ env.OWNER_LOWER }}/rustavoid:${{ env.IMAGE_TAG }}

    - name: display string
      run: |
        echo "The IMAGE_TAG is: ${{ env.IMAGE_TAG }}"

    # 4. Dispara a atualização para a sua App Store Customizada do Runtipi
    - name: Trigger Renovate
      if: success()
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/rodrigomescua/runtipi-custom-appstore/dispatches \
          -d '{"event_type": "docker-image-updated", "client_payload": {"image": "rustavoid", "tag": "${{ env.IMAGE_TAG }}"}}'
