{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
    <h2 class="panel-title">Gerenciar Categorias</h2>
    <a href="/" class="btn" style="margin-bottom: 2rem;">← Voltar para a Lista</a>
    
    <div style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 1rem;">
        <ul style="list-style: none; padding: 0;">
            {% for category in categories %}
                <li style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #333;">
                    <span style="font-weight: 600;">{{ category }}</span>
                    <button hx-delete="/categories/{{ category }}" 
                            hx-confirm="Cuidado! Isso excluirá todos os itens desta categoria. Continuar?" 
                            hx-target="closest li" 
                            hx-swap="outerHTML" 
                            class="btn-small" 
                            style="background: #c0392b; color: white;">Excluir</button>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
