services:
  rustavoid:
    container_name: rustavoid
    image: ghcr.io/rodrigomescua/rustavoid:${RUSTAVOID_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8080
      - RUST_LOG=rustavoid=info,tower_http=info
      - DATABASE_URL=sqlite:///app/data/rustavoid.db?mode=rwc
